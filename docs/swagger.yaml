definitions:
  game.AddPlayerRequest:
    properties:
      id:
        type: string
    type: object
  game.CreateGameResponse:
    properties:
      code:
        type: string
    type: object
  game.DrawTilesRequest:
    properties:
      count:
        type: integer
      id:
        type: string
    type: object
  game.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  game.GameInfoResponse:
    properties:
      code:
        type: string
      players:
        items:
          type: string
        type: array
    type: object
  game.NoteView:
    properties:
      flipped:
        type: boolean
      id:
        type: integer
      tokens:
        items:
          type: string
        type: array
    type: object
  game.NotesResponse:
    properties:
      notes:
        items:
          $ref: '#/definitions/game.NoteView'
        type: array
    type: object
  game.PickFavoriteRequest:
    properties:
      noteId:
        type: integer
    type: object
  game.PickFavoriteResponse:
    properties:
      winnerId:
        type: string
    type: object
  game.Player:
    properties:
      id:
        type: string
      score:
        type: integer
    type: object
  game.PlayersResponse:
    properties:
      players:
        items:
          $ref: '#/definitions/game.Player'
        type: array
    type: object
  game.RoundState:
    properties:
      count:
        description: notes submitted this round
        type: integer
      favoriteNoteId:
        description: 0 = none picked yet
        type: integer
      judgeId:
        type: string
      judgingOpen:
        type: boolean
      prompt:
        type: string
      round:
        type: integer
      total:
        description: players eligible to submit (judge excluded)
        type: integer
      winnerId:
        type: string
    type: object
  game.SubmitNoteRequest:
    properties:
      id:
        type: string
      note:
        description: |-
          Note is the ordered token list: tile keys ("42|banana") plus optional
          "\n" (BreakToken) markers for line breaks between clusters.
        items:
          type: string
        type: array
    type: object
  game.WordsResponse:
    properties:
      words:
        items:
          type: string
        type: array
    type: object
host: localhost:8081
info:
  contact: {}
  description: This handles the game logic and communication
  title: quipNotes Server
  version: "1.0"
paths:
  /games:
    post:
      description: Creates a new game and returns its unique 4-digit code. Driven
        by the manager (host).
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/game.CreateGameResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Starts a new game
  /games/{code}:
    delete:
      description: Removes a game from the server. Driven by the manager (host).
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Ends a game
    get:
      description: Returns a game's code and current players. Used to validate a join.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/game.GameInfoResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Game info
  /games/{code}/draw:
    post:
      consumes:
      - application/json
      description: Draws Tiles (wordTiles) for a given player and a given count
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      - description: tells how many tiles to draw
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/game.DrawTilesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/game.WordsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Draws Tiles
  /games/{code}/events:
    get:
      description: Upgrades to a WebSocket that pushes round_started / submission
        / game_ended events for the game. Both players and the host subscribe.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      responses:
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Game event stream (WebSocket)
  /games/{code}/favorite:
    post:
      consumes:
      - application/json
      description: 'Records the round''s winning note (by 1-based id): its author
        scores a point and favorite_picked is broadcast. One favorite per round; the
        note must be face-up.'
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      - description: the winning note id
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/game.PickFavoriteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/game.PickFavoriteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Picks the judge's favorite note
  /games/{code}/judging:
    post:
      description: Closes submissions and lets the judge start flipping notes before
        every player has answered (judging opens automatically when the last eligible
        player submits). Requires an active round with a judge and at least one note.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Opens judging early (judge's override)
  /games/{code}/notes/{noteId}/flip:
    post:
      description: Turns the note with the given 1-based id face-up and broadcasts
        note_flipped so every screen flips in sync. One-way and idempotent. Locked
        until judging opens, except in judge-less rounds.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      - description: 1-based note id
        in: path
        name: noteId
        required: true
        type: integer
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Flips a note face-up
  /games/{code}/players:
    get:
      description: Returns a game's current players (roster) as objects. Used by the
        host to show who has joined; forward-compatible with per-player scoring.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/game.PlayersResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Game roster
    post:
      consumes:
      - application/json
      description: Adds a player to a game. The playerId must be unique within the
        game.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      - description: contains the player id
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/game.AddPlayerRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Joins a game
  /games/{code}/players/{id}:
    delete:
      description: Removes a player from a game. The playerId must exist.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      - description: player id
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Leaves a game
  /games/{code}/players/{id}/tiles:
    get:
      description: Gets all the tiles that are drawn by the player.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      - description: player id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/game.WordsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Gets Drawn Tiles
  /games/{code}/round:
    get:
      description: 'Returns the active round''s full state: number (0 before the first
        prompt is drawn), prompt, judge, judging/submission progress, and the picked
        favorite. Used for polling and reconnect.'
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/game.RoundState'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Current round
  /games/{code}/rounds:
    post:
      description: Pops the next prompt off the game's shuffled deck, begins a new
        round (selecting its judge), and clears the previous round's notes. Driven
        by the manager (host).
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/game.RoundState'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Draws the next prompt (starts a round)
  /games/{code}/submit:
    post:
      consumes:
      - application/json
      description: Send the ordered note tokens (tile keys "42|banana" plus optional
        "\n" line breaks) to turn in your wordTiles for the game.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      - description: contains the note
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/game.SubmitNoteRequest'
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/game.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Turn in Note
  /games/{code}/submitted-notes:
    get:
      description: Returns this round's note board in its shared shuffled display
        order. Each note carries a stable 1-based id, its ordered token list (tile
        keys "42|banana" plus "\n" line breaks), and whether it is face-up. Authors
        are withheld until the favorite is picked.
      parameters:
      - description: game code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/game.NotesResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/game.ErrorResponse'
      summary: Returns the submitted notes
swagger: "2.0"
